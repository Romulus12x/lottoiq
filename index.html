<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080d18;color:#e2e8f0;font-family:'Oswald','Barlow Condensed',sans-serif;min-height:100vh}
select,input,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:16px;height:16px;border-radius:50%;border:2px solid #ff4e00;border-top-color:transparent;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle}

input[type=file]::file-selector-button{background:#ff4e00;color:#fff;border:none;padding:10px 18px;border-radius:4px;font-weight:700;font-size:13px;cursor:pointer;margin-right:12px;letter-spacing:1px;text-transform:uppercase;font-family:'Oswald',sans-serif}
select{background:#111827;color:#e2e8f0;border:1px solid #1e293b;border-radius:4px;padding:6px 10px;font-size:13px;font-weight:600}

.btn{border:none;border-radius:4px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-family:inherit;display:inline-block}
.bp{background:#ff4e00;color:#fff}
.bg{background:#16a34a;color:#fff}
.bh{background:transparent;color:#64748b;border:1px solid #1e293b}
.card{background:#0c1222;border:1px solid #1e293b;border-radius:8px;padding:18px;margin-bottom:18px}
.ct{font-size:11px;font-weight:700;color:#475569;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.lbl{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;display:block}
.ball{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-family:monospace;flex-shrink:0;vertical-align:middle}
.bh2{background:linear-gradient(135deg,#ff4e00,#ec9f05);border:2px solid #ff4e00;box-shadow:0 0 10px #ff4e0055}

.taba{color:#e2e8f0;border-bottom-color:#ff4e00;background:#1e293b}

.srow{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #0f172a}

.ok{padding:12px;background:#080d18;border:1px solid #166534;border-radius:6px;margin-bottom:10px}

@media(max-width:600px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.dash-grid{grid-template-columns:1fr!important}}

<body><div id="app"></div>
<script>
// ── Core constants ────────────────────────────────────────────────────────────
// Focused states only — Pick 5 states + TX for Pick 3/4
const STATES=["DE","FL","GA","LA","OH","PA","VA","DC","TX"];
const STATE_LABELS={DE:"Delaware",FL:"Florida",GA:"Georgia",LA:"Louisiana",OH:"Ohio",PA:"Pennsylvania",VA:"Virginia",DC:"Wash DC",TX:"Texas"};
const GAMES=["Pick 3","Pick 4","Pick 5"];
const DIGITS={"Pick 3":3,"Pick 4":4,"Pick 5":5}; // renamed from DC to avoid conflict with DC state
const SK="lottoiq_v7";
const OLD_KEYS=["lottoiq_v6","lottoiq_v5","lottoiq_v4","lottoiq_v3"];
function gamesForState(st){return st==="TX"?["Pick 3","Pick 4"]:["Pick 3","Pick 4","Pick 5"]}
function sget(){
  try{
    const r=localStorage.getItem(SK);
    if(r)return JSON.parse(r);
    for(const ok of OLD_KEYS){
      const old=localStorage.getItem(ok);
      if(old){try{const d=JSON.parse(old);localStorage.setItem(SK,JSON.stringify(d));localStorage.removeItem(ok);console.log("LottoIQ: migrated data from "+ok);return d;}catch(e){}}
    }
    return {};
  }catch(e){return{}}
}
function sset(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){console.error("LottoIQ sset failed:",e);window._SSET_ERR=String(e);}}
function isH(d){return parseInt(d)>=5}
function isE(d){return parseInt(d)%2===0}
function gsum(n){return n.reduce((s,x)=>s+parseInt(x),0)}
function grs(n){let s=gsum(n);while(s>9)s=String(s).split("").reduce((a,b)=>a+parseInt(b),0);return s}
function gsld(n){return gsum(n)%10}
function gct(n){
  // Full WOL structure classification for Pick 3, 4, and 5
  const len=n.length;
  const counts={};
  n.forEach(function(d){counts[d]=(counts[d]||0)+1;});
  const vals=Object.values(counts).sort((a,b)=>b-a);
  const uniq=vals.length;
  if(len===3){
    if(uniq===3)return"single";          // ABC
    if(uniq===2)return"double";          // AAB
    return"triple";                       // AAA
  }
  if(len===4){
    if(uniq===4)return"ABCD";
    if(uniq===3)return"AABC";            // one pair + two diff
    if(uniq===2){
      if(vals[0]===3)return"AAAB";       // trips + one
      if(vals[0]===2)return"AABB";       // two pairs
    }
    return"AAAA";                         // quad
  }
  if(len===5){
    if(uniq===5)return"ABCDE";
    if(uniq===4)return"AABCD";           // one pair + three diff
    if(uniq===3){
      if(vals[0]===3)return"AAABC";      // triple + two diff
      return"AABBC";                      // two pairs + one diff
    }
    if(uniq===2){
      if(vals[0]===4)return"AAAAB";      // quad + one
      if(vals[0]===3)return"AAABB";      // triple pair
    }
    return"AAAAA";                        // quint
  }
  // fallback
  return uniq===len?"single":uniq===1?"triple":"double";
}
function ghl(n){return n.map(x=>isH(x)?"H":"L").join("")}
function geo(n){return n.map(x=>isE(x)?"E":"O").join("")}

// ── LotteryCorner URL map ─────────────────────────────────────────────────────
const LC_MAP = {
  // Delaware
  "DE|Pick 3": [{slug:"de/play-3-day",session:"midday"},{slug:"de/play-3-night",session:"evening"}],
  "DE|Pick 4": [{slug:"de/play-4-day",session:"midday"},{slug:"de/play-4-night",session:"evening"}],
  "DE|Pick 5": [{slug:"de/play-5-day",session:"midday"},{slug:"de/play-5",session:"evening"}],
  // Florida
  "FL|Pick 3": [{slug:"fl/pick-3-midday",session:"midday"},{slug:"fl/pick-3-evening",session:"evening"}],
  "FL|Pick 4": [{slug:"fl/pick-4-midday",session:"midday"},{slug:"fl/pick-4-evening",session:"evening"}],
  "FL|Pick 5": [{slug:"fl/pick-5-midday",session:"midday"},{slug:"fl/pick-5-evening",session:"evening"}],
  // Georgia — 3 draws for Pick 3 & 4
  "GA|Pick 3": [{slug:"ga/cash-3-midday",session:"midday"},{slug:"ga/cash-3-evening",session:"evening"},{slug:"ga/cash-3-night",session:"night"}],
  "GA|Pick 4": [{slug:"ga/cash-4-midday",session:"midday"},{slug:"ga/cash-4-evening",session:"evening"},{slug:"ga/cash-4-night",session:"night"}],
  "GA|Pick 5": [{slug:"ga/georgia-five-midday",session:"midday"},{slug:"ga/georgia-five-evening",session:"evening"}],
  // Louisiana
  "LA|Pick 3": [{slug:"la/pick-3",session:"evening"}],
  "LA|Pick 4": [{slug:"la/pick-4",session:"evening"}],
  "LA|Pick 5": [{slug:"la/pick-5",session:"evening"}],
  // Maryland
  // Ohio
  "OH|Pick 3": [{slug:"oh/pick-3-midday",session:"midday"},{slug:"oh/pick-3-evening",session:"evening"}],
  "OH|Pick 4": [{slug:"oh/pick-4-midday",session:"midday"},{slug:"oh/pick-4-evening",session:"evening"}],
  "OH|Pick 5": [{slug:"oh/pick-5-midday",session:"midday"},{slug:"oh/pick-5-evening",session:"evening"}],
  // Pennsylvania
  "PA|Pick 3": [{slug:"pa/pick-3-midday",session:"midday"},{slug:"pa/pick-3-evening",session:"evening"}],
  "PA|Pick 4": [{slug:"pa/pick-4-midday",session:"midday"},{slug:"pa/pick-4-evening",session:"evening"}],
  "PA|Pick 5": [{slug:"pa/pick-5-midday",session:"midday"},{slug:"pa/pick-5-evening",session:"evening"}],
  // Virginia
  "VA|Pick 3": [{slug:"va/pick-3-day",session:"midday"},{slug:"va/pick-3-night",session:"evening"}],
  "VA|Pick 4": [{slug:"va/pick-4-day",session:"midday"},{slug:"va/pick-4-night",session:"evening"}],
  "VA|Pick 5": [{slug:"va/pick-5-day",session:"midday"},{slug:"va/pick-5-night",session:"evening"}],
  // Washington DC
  "DC|Pick 3": [{slug:"dc/dc-3-midday",session:"midday"},{slug:"dc/dc-3-evening",session:"evening"}],
  "DC|Pick 4": [{slug:"dc/dc-4-midday",session:"midday"},{slug:"dc/dc-4-evening",session:"evening"}],
  "DC|Pick 5": [{slug:"dc/dc-5-midday",session:"midday"},{slug:"dc/dc-5-evening",session:"evening"}],
  // Texas — 4 draws
  "TX|Pick 3": [{slug:"tx/pick-3-morning",session:"morning"},{slug:"tx/pick-3-day",session:"midday"},{slug:"tx/pick-3-evening",session:"evening"},{slug:"tx/pick-3-night",session:"night"}],
  "TX|Pick 4": [{slug:"tx/daily-4-morning",session:"morning"},{slug:"tx/daily-4-day",session:"midday"},{slug:"tx/daily-4-evening",session:"evening"},{slug:"tx/daily-4-night",session:"night"}],
};

// Get available session names for current state+game
function getAvailableSessions(){
  const slots=LC_MAP[ST+"|"+GM];
  if(!slots)return["midday","evening"];
  const seen=new Set();
  return slots.map(function(s){return s.session}).filter(function(s){if(seen.has(s))return false;seen.add(s);return true});
}

function analyze(drawings,game){
  const dg=DIGITS[game];
  const fr={},pf={},cf={},ls={},hl={},eo={},sc={},rc={},sl={},tc={},fp={},bp={},mp={},rfr={};
  // Positional frequency: pos[position][digit] = count
  const pos=Array.from({length:dg},()=>({}));

  const recencyWindow=Math.min(30,drawings.length);
  drawings.forEach(function(d,idx){
    const n=d.numbers;if(!n||n.length!==dg)return;
    // Recency weight: recent draws count more (exponential decay)
    const recWeight=idx<recencyWindow?Math.exp(-idx/15):0;
    n.forEach(function(x,pi){
      fr[x]=(fr[x]||0)+1;
      rfr[x]=(rfr[x]||0)+recWeight; // recency-weighted frequency
      if(ls[x]===undefined)ls[x]=idx;
      pos[pi][x]=(pos[pi][x]||0)+1;
    });
    for(let i=0;i<n.length;i++)for(let j=i+1;j<n.length;j++){const k=[n[i],n[j]].sort().join("-");pf[k]=(pf[k]||0)+1}
    const ck=[...n].sort().join("-");cf[ck]=(cf[ck]||0)+1;
    const h=ghl(n);hl[h]=(hl[h]||0)+1;
    const e=geo(n);eo[e]=(eo[e]||0)+1;
    const s=gsum(n);sc[s]=(sc[s]||0)+1;
    const r=grs(n);rc[r]=(rc[r]||0)+1;
    const sl2=gsld(n);sl[sl2]=(sl[sl2]||0)+1;
    const ct=gct(n);tc[ct]=(tc[ct]||0)+1;
    const fpp=n[0]+n[1];fp[fpp]=(fp[fpp]||0)+1;
    const bpp=n[n.length-2]+n[n.length-1];bp[bpp]=(bp[bpp]||0)+1;
    if(dg===4){const mpp=n[1]+n[2];mp[mpp]=(mp[mpp]||0)+1}
  });
  const all=Array.from({length:10},(_,i)=>String(i));
  const due=all.map(x=>({n:x,last:ls[x]!==undefined?ls[x]:drawings.length,count:fr[x]||0})).sort((a,b)=>b.last-a.last);
  const fs=Object.entries(fr).sort((a,b)=>b[1]-a[1]);
  const hot=fs.slice(0,5).map(e=>e[0]);
  const cold=fs.slice(-5).map(e=>e[0]);
  // Top digit per position
  const posTop=pos.map(function(p){return Object.entries(p).sort((a,b)=>b[1]-a[1])});
  const lastDraw=drawings.length>0?drawings[0].numbers:[];
  // Recency-weighted hot/cold
  const rfs=Object.entries(rfr).sort((a,b)=>b[1]-a[1]);
  const rhot=rfs.slice(0,5).map(e=>e[0]);
  const rcold=rfs.slice(-5).map(e=>e[0]);
  return{fr,rfr,drawings,pos,posTop,due,hot,cold,rhot,rcold,topP:Object.entries(pf).sort((a,b)=>b[1]-a[1]).slice(0,10),topC:Object.entries(cf).sort((a,b)=>b[1]-a[1]).slice(0,10),topFP:Object.entries(fp).sort((a,b)=>b[1]-a[1]).slice(0,10),topBP:Object.entries(bp).sort((a,b)=>b[1]-a[1]).slice(0,10),topMP:Object.entries(mp).sort((a,b)=>b[1]-a[1]).slice(0,10),hl,eo,sc,rc,sl,tc,topHL:Object.entries(hl).sort((a,b)=>b[1]-a[1]),topEO:Object.entries(eo).sort((a,b)=>b[1]-a[1]),topS:Object.entries(sc).sort((a,b)=>b[1]-a[1]),topR:Object.entries(rc).sort((a,b)=>b[1]-a[1]),topSL:Object.entries(sl).sort((a,b)=>b[1]-a[1]),total:drawings.length,lastDraw};
}

function predict(an,game,ins){
  const dg=DIGITS[game];
  const{fr,due,hot,total,hl,eo,sc,rc,tc}=an;
  if(total<5)return[];

  // ── WOL Step 1: Seed from previous draw ──────────────────────────────────
  const lastDrawNums=an.lastDraw?an.lastDraw.map(String):[];
  const prev2Nums=an.drawings&&an.drawings[1]?an.drawings[1].numbers.map(String):[];
  const mirrorOfLast=lastDrawNums.map(d=>String((parseInt(d)+5)%10));

  // ── WOL Trigger check: are any mirror pairs active? ───────────────────────
  // Mirror pairs: 0↔5, 1↔6, 2↔7, 3↔8, 4↔9
  const mirrorPairs=[[0,5],[1,6],[2,7],[3,8],[4,9]];
  const activeTriggers=mirrorPairs.filter(([a,b])=>
    lastDrawNums.includes(String(a))&&lastDrawNums.includes(String(b))
  );
  const triggerActive=activeTriggers.length>0; // both sides of a pair in last draw

  // ── Day-of-week signal (WOL: Tue/Thu/Sat favor doubles) ──────────────────
  const dow=new Date().getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  const doubleDay=dow===2||dow===4||dow===6; // Tue, Thu, Sat

  // ── WOL Step 2: Three-tier Hot Box scoring ────────────────────────────────
  // Red Box (Super Hot) = top 3 digits by combined score
  // Green Box (Hot) = next 4 digits
  // Black Box (Warm) = remaining 3 digits
  const rfr=an.rfr||{};
  const maxRfr=Math.max(...Object.values(rfr).concat([1]));
  const maxFr=Math.max(...Object.values(fr).concat([1]));

  // Base scores before tier assignment
  const baseScores={};
  for(let i=0;i<=9;i++){
    const n=String(i);
    const isLast=lastDrawNums.includes(n);
    const isMirror=!isLast&&mirrorOfLast.includes(n);
    const isCarryover=isLast&&prev2Nums.includes(n);

    const histScore=(fr[n]||0)/maxFr*25;
    const recScore=(rfr[n]||0)/maxRfr*35;
    const carryScore=isCarryover?30:isLast?22:isMirror?12:0;
    const di=due.findIndex(d=>d.n===n);
    const dueScore=di===0?8:di===1?5:di===2?3:0;
    const hotScore=hot.includes(n)?5:0;
    baseScores[n]=histScore+recScore+carryScore+dueScore+hotScore;
  }

  // Assign WOL tiers
  const sorted10=Object.entries(baseScores).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  const redBox=sorted10.slice(0,3);   // Super Hot Box
  const greenBox=sorted10.slice(3,7); // Hot Box
  const blackBox=sorted10.slice(7);   // Warm Box

  // WOL color multipliers: Red numbers first, Green second, Black last
  // Inside each box: Red digits (top of that box) score highest
  const scores={};
  for(let i=0;i<=9;i++){
    const n=String(i);
    let tierMult=1.0;
    if(redBox.includes(n)){
      // Red box: red digits(1st) get 1.4x, green(2nd) 1.2x, black(3rd) 1.0x
      const pos=redBox.indexOf(n);
      tierMult=pos===0?1.4:pos===1?1.2:1.0;
    } else if(greenBox.includes(n)){
      // Green box: red digits get 1.1x, rest 0.9x
      const pos=greenBox.indexOf(n);
      tierMult=pos===0?1.1:0.9;
    } else {
      tierMult=0.75; // Black/warm box — lower priority
    }
    scores[n]=baseScores[n]*tierMult;
  }

  // Inspector boosts
  if(ins){
    if(ins.keyNumbers)Object.entries(ins.keyNumbers).forEach(e=>{
      if(scores[e[0]]!==undefined)scores[e[0]]+=(e[1]/100)*15;
    });
    if(ins.topPairs)ins.topPairs.slice(0,10).forEach(e=>
      e[0].split("-").forEach(n=>{if(scores[n]!==undefined)scores[n]+=4;})
    );
  }

  const mp=Math.max(...Object.values(scores));

  // ── WOL Step 3: Dominant play type with day-of-week override ─────────────
  const dHL=Object.entries(hl).sort((a,b)=>b[1]-a[1])[0];
  const dEO=Object.entries(eo).sort((a,b)=>b[1]-a[1])[0];
  const hs=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>parseInt(e[0]));
  const hr=Object.entries(rc).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>parseInt(e[0]));
  const iHL=ins&&ins.dominantHL?ins.dominantHL:(dHL?dHL[0]:null);
  const iEO=ins&&ins.dominantEO?ins.dominantEO:(dEO?dEO[0]:null);
  const iS=ins&&ins.hotSums&&ins.hotSums.length?ins.hotSums:hs;
  const iR=ins&&ins.hotRoots&&ins.hotRoots.length?ins.hotRoots:hr;

  // Structure type: WOL says use triggers + day-of-week to pick type
  // Pick 5: bias toward doubles (they cover ~50% of all combos per WOL math)
  // Pick 4/3: use dominant historical type, boosted by trigger/day signals
  const histDomType=Object.entries(tc||{}).sort((a,b)=>b[1]-a[1]).map(e=>e[0])[0]||"single";
  const insDomType=ins&&ins.dominantType?ins.dominantType:null;

  let dominantStruct=insDomType||histDomType;

  // WOL trigger override: if mirror pair trigger active, force double structure
  if(triggerActive){
    if(dg===3)dominantStruct="double";
    else if(dg===4)dominantStruct="AABC"; // one pair + two different
    else if(dg===5)dominantStruct="AABCD"; // one pair + three different
  }
  // Day-of-week override: Tue/Thu/Sat favor doubles
  if(doubleDay&&!triggerActive){
    if(dg===3&&dominantStruct==="single")dominantStruct="double";
    else if(dg===4&&dominantStruct==="ABCD")dominantStruct="AABC";
    else if(dg===5&&dominantStruct==="ABCDE")dominantStruct="AABCD";
  }
  // Pick 5 math bias: if no strong signal, prefer AABCD (doubles cover 50%)
  if(dg===5&&!triggerActive&&!doubleDay&&dominantStruct==="ABCDE"){
    const singleCount=tc["ABCDE"]||0;
    const doubleCount=tc["AABCD"]||0;
    if(doubleCount>0||singleCount===0)dominantStruct="AABCD";
  }

  // pb() — pattern bonus for a given pick
  const iT=dominantStruct;
  function pb(pick){
    let s=0;
    if(iHL&&ghl(pick)===iHL)s+=20;
    if(iEO&&geo(pick)===iEO)s+=20;
    if(iS.includes(gsum(pick)))s+=15;
    if(iR.includes(grs(pick)))s+=10;
    if(iT&&gct(pick)===iT)s+=15;
    // WOL: bonus if pick uses red box digits
    const redCount=pick.filter(n=>redBox.includes(n)).length;
    s+=redCount*5; // +5 per red box digit in pick
    // WOL: bonus if pick contains carryover digit
    const carryCount=pick.filter(n=>lastDrawNums.includes(n)).length;
    s+=carryCount*4;
    return s;
  }

  // ── WOL Step 4-6: Generate structured picks using Hot Box priority ─────────
  function makeStructuredPick(targetType,scoreMap,dg){
    const sorted=Object.entries(scoreMap).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
    // Prefer red box digits first within sorted order
    const sortedWOL=[
      ...sorted.filter(n=>redBox.includes(n)),
      ...sorted.filter(n=>greenBox.includes(n)),
      ...sorted.filter(n=>blackBox.includes(n))
    ];
    const pick=[];
    if(dg===3){
      if(targetType==="double"){
        const d1=sortedWOL[0];
        const d2=sortedWOL.find(x=>x!==d1)||sortedWOL[1];
        const pos=[0,1,2];pos.sort(()=>Math.random()-0.5);
        pick[pos[0]]=d1;pick[pos[1]]=d1;pick[pos[2]]=d2;
      } else if(targetType==="triple"){
        pick.push(sortedWOL[0],sortedWOL[0],sortedWOL[0]);
      } else {
        for(let p=0;p<3;p++){const pool=sortedWOL.filter(x=>!pick.includes(x));pick.push(pool[0]||sortedWOL[p%sortedWOL.length]);}
      }
    } else if(dg===4){
      if(targetType==="AABB"){
        const d1=sortedWOL[0],d2=sortedWOL.find(x=>x!==d1)||sortedWOL[1];
        [d1,d1,d2,d2].sort(()=>Math.random()-0.5).forEach(x=>pick.push(x));
      } else if(targetType==="AABC"){
        const d1=sortedWOL[0],d2=sortedWOL.find(x=>x!==d1)||sortedWOL[1],d3=sortedWOL.find(x=>x!==d1&&x!==d2)||sortedWOL[2];
        [d1,d1,d2,d3].sort(()=>Math.random()-0.5).forEach(x=>pick.push(x));
      } else if(targetType==="AAAB"){
        const d1=sortedWOL[0],d2=sortedWOL.find(x=>x!==d1)||sortedWOL[1];
        [d1,d1,d1,d2].sort(()=>Math.random()-0.5).forEach(x=>pick.push(x));
      } else {
        // ABCD
        for(let p=0;p<4;p++){const pool=sortedWOL.filter(x=>!pick.includes(x));pick.push(pool[0]||sortedWOL[p%sortedWOL.length]);}
      }
    } else if(dg===5){
      if(targetType==="AABCD"){
        const d1=sortedWOL[0],rest=sortedWOL.filter(x=>x!==d1).slice(0,3);
        [d1,d1,...rest].sort(()=>Math.random()-0.5).forEach(x=>pick.push(x));
      } else if(targetType==="AABBC"){
        const d1=sortedWOL[0],d2=sortedWOL.find(x=>x!==d1)||sortedWOL[1],d3=sortedWOL.find(x=>x!==d1&&x!==d2)||sortedWOL[2];
        [d1,d1,d2,d2,d3].sort(()=>Math.random()-0.5).forEach(x=>pick.push(x));
      } else if(targetType==="AAABC"){
        const d1=sortedWOL[0],d2=sortedWOL.find(x=>x!==d1)||sortedWOL[1],d3=sortedWOL.find(x=>x!==d1&&x!==d2)||sortedWOL[2];
        [d1,d1,d1,d2,d3].sort(()=>Math.random()-0.5).forEach(x=>pick.push(x));
      } else {
        // ABCDE
        for(let p=0;p<5;p++){const pool=sortedWOL.filter(x=>!pick.includes(x));pick.push(pool[0]||sortedWOL[p%sortedWOL.length]);}
      }
    }
    return pick.length===dg?pick:null;
  }

  const picks=[],seen=new Set();
  // WOL: 3 picks matching dominant structure, 2 open for coverage
  // If trigger active: first pick always uses double structure
  const structTargets=[dominantStruct,dominantStruct,dominantStruct,"open","open"];

  for(let att=0;att<2000&&picks.length<5;att++){
    const useStruct=structTargets[picks.length]!=="open";
    let pick=null;
    if(useStruct){
      pick=makeStructuredPick(dominantStruct,scores,dg);
    }
    if(!pick||!pick.length){
      pick=[];
      for(let p=0;p<dg;p++){
        const pool=Object.entries(scores).sort(()=>Math.random()-0.45);
        pick.push(pool[0][0]);
      }
    }
    if(pick.length!==dg)continue;
    const key=[...pick].sort().join("-");if(seen.has(key))continue;seen.add(key);
    const base=pick.reduce((s,n)=>s+scores[n],0)/dg;
    const conf=Math.min(99,Math.round((base/mp)*65+pb(pick)));
    const redUsed=pick.filter(n=>redBox.includes(n)).length;
    const carryUsed=pick.filter(n=>lastDrawNums.includes(n)).length;
    picks.push({
      numbers:pick,confidence:conf,
      straight:pick.join(""),box:[...pick].sort().join(""),
      hl:ghl(pick),eo:geo(pick),type:gct(pick),sum:gsum(pick),rs:grs(pick),
      redBox:redUsed,carryOver:carryUsed,
      triggerActive,doubleDay,
      wolTier:redUsed>=Math.ceil(dg/2)?"🔴 Red":redUsed>0?"🟢 Green":"⚫ Black"
    });
  }
  return picks.sort((a,b)=>b.confidence-a.confidence).slice(0,5);
}

function parsePaste(text,dg){
  const lines=text.trim().split(/[\n,]/).map(l=>l.trim()).filter(Boolean);
  const res=[];
  for(const line of lines){
    const t=line.match(/\d+/g);if(!t)continue;
    if(t.length===1&&t[0].length===dg){const dm=line.match(/\d{1,2}\/\d{1,2}/);res.push({numbers:t[0].split(""),date:dm?dm[0]:""})}
    else if(t.length>=dg)res.push({numbers:t.slice(0,dg).map(x=>x[0]),date:""});
  }
  return res;
}

async function generateDailyPreds(){
  const dateKey=getTodayKey();
  if(DB.dailyPreds[dateKey]&&Object.keys(DB.dailyPreds[dateKey]).length>0){
    if(!confirm("Predictions for today ("+dateKey+") already exist. Regenerate?"))return;
  }
  DAILY_GEN_LOADING=true;
  DAILY_GEN_MSG="Step 1/3: Syncing latest draws...";render();

  // Step 1: Auto-sync all states silently
  const allGames=["Pick 3","Pick 4","Pick 5"];
  const origST=ST,origGM=GM,origSession=SYNC_SESSION;
  SYNC_SESSION="all";
  let syncErrors=0,syncAdded=0;
  for(const st of STATES){
    for(const gm of allGames){
      const lcKey=st+"|"+gm;
      const slots=LC_MAP[lcKey];
      if(!slots||!slots.length)continue;
      for(const slot of slots){
        const lcUrl="https://www.lotterycorner.com/"+slot.slug+"/"+new Date().getFullYear();
        const proxyUrl="https://corsproxy.io/?"+encodeURIComponent(lcUrl);
        try{
          const resp=await fetch(proxyUrl);
          if(!resp.ok)continue;
          const html=await resp.text();
          const trReg=/<tr[^>]*>([\s\S]*?)<\/tr>/gi;
          const monthPat="January|February|March|April|May|June|July|August|September|October|November|December";
          const datePat=new RegExp("("+monthPat+")\s+(\d{1,2}),\s+(\d{4})","i");
          const dg=DIGITS[gm];
          const drawings=[];
          let trMatch;
          while((trMatch=trReg.exec(html))!==null){
            const row=trMatch[1];
            const dm=datePat.exec(row);
            if(!dm)continue;
            const dateStr=dm[1]+" "+dm[2]+", "+dm[3];
            const stripped=row.replace(/<[^>]+>/g," ");
            const digits=stripped.match(/(?<!\d)(\d)(?!\d)/g)||[];
            if(digits.length>=dg)drawings.push({numbers:digits.slice(0,dg),date:dateStr,session:slot.session});
          }
          if(drawings.length){
            const existing=DB.drawings[lcKey]||[];
            const existingKeys=new Set(existing.map(function(d){return d.numbers.join("")+"|"+(d.date||"")+(d.session||"");}));
            const newOnes=drawings.filter(function(d){return!existingKeys.has(d.numbers.join("")+"|"+(d.date||"")+slot.session);});
            if(newOnes.length){DB.drawings[lcKey]=[...newOnes,...existing].slice(0,1000);bustCache(lcKey);syncAdded+=newOnes.length;}
          }
        }catch(e){syncErrors++;}
      }
    }
  }
  if(syncAdded>0)saveDB();
  SYNC_SESSION=origSession;

  // Step 2: Score any unscored past predictions
  DAILY_GEN_MSG="Step 2/3: Checking yesterday\'s results...";render();
  autoCheckResults();

  // Step 3: Generate session-matched predictions
  // WOL: midday draws seed midday predictions, evening seeds evening
  DAILY_GEN_MSG="Step 3/3: Generating session-matched predictions...";render();
  const snapshot={};
  STATES.forEach(function(st){
    allGames.forEach(function(gm){
      const key=st+"|"+gm;
      const allDraws=DB.drawings[key]||[];
      if(allDraws.length<10)return;
      const ins=DB.inspector[key]||null;
      const slots=LC_MAP[key]||[];
      const sessions=[...new Set(slots.map(function(s){return s.session;}))];

      if(sessions.length<=1){
        // Single session state (LA, etc.) — use all draws
        const an=analyze(allDraws,gm);
        if(!an)return;
        const preds=predict(an,gm,ins);
        if(!preds||!preds.length)return;
        snapshot[key]=preds.slice(0,3).map(function(p){
          return{straight:p.straight,box:p.box,confidence:p.confidence,hl:p.hl,eo:p.eo,sum:p.sum,hit:"PENDING",session:"all"};
        });
      } else {
        // Multi-session: generate separate predictions per session
        snapshot[key]=[];
        sessions.forEach(function(sess){
          const sessDraws=allDraws.filter(function(d){
            return d.session===sess||(sess==="midday"&&(!d.session||d.session==="midday"))||
                   (sess==="morning"&&d.session==="morning")||(sess==="day"&&d.session==="day")||
                   (sess==="evening"&&d.session==="evening")||(sess==="night"&&d.session==="night");
          });
          if(sessDraws.length<8)return;
          const an=analyze(sessDraws,gm);
          if(!an)return;
          const preds=predict(an,gm,ins);
          if(!preds||!preds.length)return;
          // Top 2 per session
          preds.slice(0,2).forEach(function(p){
            snapshot[key].push({straight:p.straight,box:p.box,confidence:p.confidence,hl:p.hl,eo:p.eo,sum:p.sum,hit:"PENDING",session:sess});
          });
        });
        if(!snapshot[key].length)delete snapshot[key];
      }
    });
  });
  DB.dailyPreds[dateKey]=snapshot;
  const keys2=Object.keys(DB.dailyPreds).sort();
  if(keys2.length>60)keys2.slice(0,keys2.length-60).forEach(function(k){delete DB.dailyPreds[k];});
  saveDB();
  DAILY_GEN_LOADING=false;
  DAILY_GEN_MSG="✓ Synced "+syncAdded+" new draws · Predictions locked for "+Object.keys(snapshot).length+" games · "+dateKey;
  render();
}

function autoCheckResults(){
  // Run silently on app open — check all PENDING predictions against draw history
  let totalChecked=0,totalHits=0;
  const today=getTodayKey();

  Object.entries(DB.dailyPreds).forEach(function(dateEntry){
    const dateKey=dateEntry[0],snap=dateEntry[1];
    // Only check past days (not today — draws may not be in yet)
    if(dateKey>=today)return;

    Object.entries(snap).forEach(function(gameEntry){
      const gameKey=gameEntry[0],preds=gameEntry[1];
      const drawings=DB.drawings[gameKey]||[];
      if(!drawings.length)return;

      // Find draws that match this date
      // dateKey is YYYY-MM-DD, draw dates are stored as "Month DD, YYYY"
      const dateParts=dateKey.split("-");
      const monthNames=["","January","February","March","April","May","June","July","August","September","October","November","December"];
      const targetDate=monthNames[parseInt(dateParts[1])]+" "+parseInt(dateParts[2])+", "+dateParts[0];

      // Find draws from that date
      const dateDraws=drawings.filter(function(d){
        return d.date===targetDate;
      });

      // Only score if we have draws with actual dates for this day
      // Seeded draws have empty dates — skip them to avoid false MISSes
      const datedDraws=drawings.filter(function(d){return d.date&&d.date.length>0;});
      if(!datedDraws.length)return; // no dated draws in history at all for this game

      if(!dateDraws.length)return; // no draws found for this specific date — leave PENDING

      preds.forEach(function(pred,idx){
        if(pred.hit!=="PENDING")return;

        // Session-matched checking
        var drawsToCheck=dateDraws;
        if(pred.session&&pred.session!=="all"){
          const sessMatch=dateDraws.filter(function(d){
            return d.session===pred.session||
              (pred.session==="midday"&&(!d.session||d.session==="midday"))||
              (pred.session==="evening"&&d.session==="evening")||
              (pred.session==="morning"&&d.session==="morning")||
              (pred.session==="night"&&d.session==="night");
          });
          // If we have session-specific draws, use them
          // If not, don't mark as MISS — the session draw may not be synced yet
          if(sessMatch.length){
            drawsToCheck=sessMatch;
          } else {
            return; // leave PENDING — session draw not in history yet
          }
        }

        var hitType="MISS";
        drawsToCheck.forEach(function(draw){
          if(!draw.numbers||!draw.numbers.length)return;
          const actual=draw.numbers.join("");
          const actualBox=[...draw.numbers].sort().join("");
          const predStraight=pred.straight;
          const predBox=pred.box||[...pred.straight.split("")].sort().join("");
          if(actual===predStraight){hitType="STRAIGHT";}
          else if(actualBox===predBox&&hitType==="MISS"){hitType="BOX";}
        });

        DB.dailyPreds[dateKey][gameKey][idx].hit=hitType;
        totalChecked++;
        if(hitType!=="MISS")totalHits++;
      });
    });
  });

  if(totalChecked>0){
    saveDB();
    console.log("LottoIQ auto-check: "+totalChecked+" predictions scored, "+totalHits+" hits found");
  }
  return{checked:totalChecked,hits:totalHits};
}

function getDailyStats(days){
  days=days||30;

  var total=0,straight=0,box=0,miss=0,byGame={};
  Object.entries(DB.dailyPreds).forEach(function(e){
    const dateKey=e[0],snap=e[1];
    const d=new Date(dateKey);
    if(d<cutoff)return;
    Object.entries(snap).forEach(function(ge){
      const gk=ge[0],preds=ge[1];
      if(!byGame[gk])byGame[gk]={total:0,straight:0,box:0,miss:0};
      preds.forEach(function(p){
        if(p.hit==="PENDING")return;
        total++;byGame[gk].total++;
        if(p.hit==="STRAIGHT"){straight++;byGame[gk].straight++;}
        else if(p.hit==="BOX"){box++;byGame[gk].box++;}
        else{miss++;byGame[gk].miss++;}
      });
    });
  });
  return{total,straight,box,miss,byGame};
}

// ── Due/Overdue parsers ───────────────────────────────────────────────────────
// Parses LotteryPost "Copy Report" text from Pairs Analysis or Combinations Analysis
// LotteryPost pair rows: "47  11  Sep 14, 2025  370"
// LotteryPost combo rows: "014  7  8.75  Mar 6, 2025  753"
function parseDueReport(text, type){
  const lines=text.trim().split("\n").map(function(l){return l.trim()}).filter(Boolean);
  const rows=[];
  for(var li=0;li<lines.length;li++){
    var line=lines[li];
    // Skip header/title lines that don't start with a number or a leading-zero number
    if(/^(pair|combo|number|times|draws|last|expected|game|date|range|drawing|copy|late|front|back|mid|single|double|analysis|report|state|pick)/i.test(line))continue;
    // Each row starts with the identifier (pair like "47" or combo like "014" or "0147")
    // Then: timesDrawn, [expected for combos], lastSeen date, drawsSince
    // Strategy: grab first token as identifier, last number as drawsSince, date by month name
    var trimmed=line.trim();
    if(!trimmed)continue;

    // Extract identifier — first whitespace-delimited token of digits
    var firstToken=trimmed.split(/\s+/)[0];
    if(!/^\d+$/.test(firstToken))continue; // must be all digits
    var identifier=firstToken;

    // Extract all numbers from rest of line
    var rest=trimmed.slice(firstToken.length).trim();
    var allNums=rest.match(/\d+/g);
    if(!allNums||!allNums.length)continue;

    // drawsSince is last number in line (unless it looks like a year)
    var drawsSince=parseInt(allNums[allNums.length-1]);
    // timesDrawn is first number after identifier
    var timesDrawn=parseInt(allNums[0])||0;

    // Expected (combos only — decimal in line)
    var expectedMatch=line.match(/(\d+\.\d+)/);
    var expected=expectedMatch?parseFloat(expectedMatch[1]):null;

    // Date — month name pattern
    var dateMatch=line.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2},?\s*\d{4}/i);
    var lastSeen=dateMatch?dateMatch[0]:"";

    if(identifier&&drawsSince>0&&drawsSince<5000){
      rows.push({id:identifier,timesDrawn:timesDrawn,expected:expected,lastSeen:lastSeen,drawsSince:drawsSince});
    }
  }
  return rows.sort(function(a,b){return b.drawsSince-a.drawsSince});
}

async function apiCall(messages,maxT){

  const headers={"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};

  }catch(fetchErr){

  }
  let d;

    if(r.status===400)throw new Error("400: "+d.error.message+" ("+d.error.type+")");

}

// ── Auto Sync ─────────────────────────────────────────────────────────────────
async function autoSync(){
  const key=ST+"|"+GM;
  const slots=LC_MAP[key];
  if(!slots||!slots.length){
    SYNC_MSG="Auto-sync not configured for "+ST+" "+GM+". Import manually.";
    SYNC_LOADING=false;render();return;
  }
  SYNC_LOADING=true;SYNC_MSG="";render();
  const dg=DIGITS[GM];
  const year=new Date().getFullYear();
  let totalAdded=0,errors=[];

  const filteredSlots=SYNC_SESSION==="all"?slots:slots.filter(function(s){
    return s.session===SYNC_SESSION;
  });

  for(let si=0;si<filteredSlots.length;si++){
    const slot=filteredSlots[si];
    const sessionName=slot.session;
    const lcUrl="https://www.lotterycorner.com/"+slot.slug+"/"+year;
    const proxyUrl="https://corsproxy.io/?"+encodeURIComponent(lcUrl);
    try{
      SYNC_MSG="Fetching "+sessionName+" results...";render();
      const resp=await fetch(proxyUrl);
      if(!resp.ok)throw new Error("Fetch failed: HTTP "+resp.status);
      const html=await resp.text();

      // Parse the results table
      // Rows look like: <td>March 22, 2026</td><td>6  7  6  Fire Ball</td>
      const drawings=[];
      // Match table rows with date and result
      // Parse: find all <tr> rows containing a date, strip HTML, extract digits
      const trReg = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
      const monthPat = "January|February|March|April|May|June|July|August|September|October|November|December";
      const datePat = new RegExp("(" + monthPat + ")\\s+(\\d{1,2}),\\s+(\\d{4})", "i");
      let trMatch;
      while ((trMatch = trReg.exec(html)) !== null) {
        const row = trMatch[1];
        const dm = datePat.exec(row);
        if (!dm) continue;
        const dateStr = dm[1] + " " + dm[2] + ", " + dm[3];
        // Strip tags, collect single digits 0-9
        const stripped = row.replace(/<[^>]+>/g, " ");
        const allDigits = [];
        const digitReg = /(?<![\d])(\d)(?![\d])/g;
        let dm2;
        while ((dm2 = digitReg.exec(stripped)) !== null) {
          allDigits.push(dm2[1]);
        }
        if (allDigits.length >= dg) {
          drawings.push({ numbers: allDigits.slice(0, dg), date: dateStr, session: sessionName });
        }
      }
      // Fallback: strip ALL html and scan plain text for date + digit sequences
      if (!drawings.length) {
        const plain = html.replace(/<script[\s\S]*?<\/script>/gi,"").replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").replace(/\s+/g," ");
        const chunks = plain.split(/(?=(?:January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},\s+\d{4})/);
        for (const chunk of chunks) {
          const dm3 = datePat.exec(chunk);
          if (!dm3) continue;
          const dateStr = dm3[1] + " " + dm3[2] + ", " + dm3[3];
          const rest = chunk.slice(dm3.index + dm3[0].length, dm3.index + dm3[0].length + 60);
          const digits = [];
          const dg2 = /(?<![\d])(\d)(?![\d])/g;
          let m4;
          while ((m4 = dg2.exec(rest)) !== null) digits.push(m4[1]);
          if (digits.length >= dg) drawings.push({ numbers: digits.slice(0,dg), date: dateStr, session: sessionName });
        }
      }
      // Deduplicate against existing
      const existing=DB.drawings[key]||[];
      const existingKeys=new Set(existing.map(function(d){
        return d.numbers.join("")+"|"+(d.date||"")+(d.session||"");
      }));
      const newOnes=drawings.filter(function(d){
        return!existingKeys.has(d.numbers.join("")+"|"+(d.date||"")+sessionName);
      });

      if(newOnes.length>0){
        DB.drawings[key]=[...newOnes,...existing].slice(0,1000);
        bustCache(key);
        totalAdded+=newOnes.length;
      }
      SYNC_MSG="Syncing... "+sessionName+" done ("+newOnes.length+" new)";render();
    }catch(e){
      errors.push(sessionName+": "+e.message);
    }
  }

  saveDB();
  SYNC_LOADING=false;
  if(totalAdded>0){
    SYNC_MSG="✓ Added "+totalAdded+" new drawings for "+ST+" "+GM;
  }else if(errors.length){
    SYNC_MSG="⚠ Could not sync: "+errors.slice(0,2).join("; ")+(errors.length>2?" (+more)":"");
  }else{
    SYNC_MSG="Already up to date — no new drawings found";
  }
  render();
}

async function parseInspImg(){
  if(!INSP_FILES.length)return;
  INSP_PARSING=true;INSP_RESULTS=[];INSP_MERGED=null;INSP_ERROR="";render();
  try{
    const dg=DIGITS[GM];
    const prompt="LotteryPost Inspector "+dg+" output for "+GM+". Extract all classification data visible in this screenshot.\nRespond ONLY with JSON (no markdown):\n{\"dominantHL\":\"HHL\",\"hlCounts\":{\"HHH\":92,\"HHL\":262,\"HLL\":260,\"LLL\":116},\"dominantEO\":\"EOO\",\"eoCounts\":{\"EEE\":10,\"EEO\":80,\"EOO\":120,\"OOO\":50},\"hotSums\":[15,16,14],\"sumCounts\":{\"15\":46,\"16\":40},\"hotRoots\":[6,3,9],\"rootCounts\":{\"6\":90,\"3\":80},\"sldCounts\":{\"5\":90,\"6\":80},\"keyNumbers\":{\"0\":55,\"1\":60,\"2\":58,\"3\":62,\"4\":50,\"5\":65,\"6\":70,\"7\":68,\"8\":52,\"9\":48},\"topPairs\":[[\"1-5\",45],[\"2-6\",38]],\"dominantType\":\"single\",\"typeCounts\":{\"single\":516,\"double\":200,\"triple\":14},\"combinationsInspected\":730,\"notes\":\"FL Pick 3\"}\nUse null for fields not visible in this screenshot.";
    // Parse each screenshot in parallel
    const results=await Promise.all(INSP_FILES.map(async function(file){
      const b=await f2b(file);
      const mt=file.type&&file.type.startsWith("image/")?file.type:"image/png";
      const t=await apiCall([{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data:b}},{type:"text",text:prompt}]}],2000);
      return JSON.parse(t.replace(/```json|```/g,"").trim());
    }));
    INSP_RESULTS=results;
    // Merge all results — combine counts, take dominant from merged totals
    const merged={hlCounts:{},eoCounts:{},sumCounts:{},rootCounts:{},sldCounts:{},keyNumbers:{},topPairs:[],typeCounts:{single:0,double:0,triple:0},combinationsInspected:0,notes:""};
    results.forEach(function(r){
      if(!r)return;
      // Merge count objects
      ["hlCounts","eoCounts","sumCounts","rootCounts","sldCounts"].forEach(function(k){
        if(r[k])Object.entries(r[k]).forEach(function(e){merged[k][e[0]]=(merged[k][e[0]]||0)+e[1]});
      });
      // Merge keyNumbers (average percentages)
      if(r.keyNumbers)Object.entries(r.keyNumbers).forEach(function(e){
        if(!merged.keyNumbers[e[0]])merged.keyNumbers[e[0]]={sum:0,count:0};
        merged.keyNumbers[e[0]].sum+=e[1];merged.keyNumbers[e[0]].count+=1;
      });
      // Merge typeCounts
      if(r.typeCounts)Object.entries(r.typeCounts).forEach(function(e){merged.typeCounts[e[0]]=(merged.typeCounts[e[0]]||0)+e[1]});
      // Merge pairs (accumulate)
      if(r.topPairs)r.topPairs.forEach(function(p){
        const ex=merged.topPairs.find(x=>x[0]===p[0]);
        if(ex)ex[1]+=p[1];else merged.topPairs.push([p[0],p[1]]);
      });
      if(r.combinationsInspected)merged.combinationsInspected+=r.combinationsInspected;
      if(r.notes&&!merged.notes)merged.notes=r.notes;
    });
    // Finalize keyNumbers as averages
    Object.keys(merged.keyNumbers).forEach(function(k){
      const v=merged.keyNumbers[k];
      merged.keyNumbers[k]=Math.round(v.sum/v.count);
    });
    // Sort topPairs
    merged.topPairs.sort(function(a,b){return b[1]-a[1]});
    // Derive dominants from merged counts
    function dominant(obj){const e=Object.entries(obj).sort((a,b)=>b[1]-a[1]);return e.length?e[0][0]:null}
    merged.dominantHL=dominant(merged.hlCounts);
    merged.dominantEO=dominant(merged.eoCounts);
    merged.dominantType=dominant(merged.typeCounts);
    merged.hotSums=Object.entries(merged.sumCounts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>parseInt(e[0]));
    merged.hotRoots=Object.entries(merged.rootCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>parseInt(e[0]));
    INSP_MERGED=merged;
  }catch(e){INSP_ERROR="Could not parse: "+e.message}
  INSP_PARSING=false;render();
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function buildLeaderboard(){
  var board=[];
  STATES.forEach(function(st){
    gamesForState(st).forEach(function(gm){
      var key=st+"|"+gm;
      var results=DB.results[key]||[];
      var drawings=DB.drawings[key]||[];
      // Count all predictions across all logged results
      var totalPreds=0,straights=0,boxes=0;
      results.forEach(function(r){
        (r.preds||[]).forEach(function(p){
          totalPreds++;
          if(p.hit==="STRAIGHT")straights++;
          else if(p.hit==="BOX")boxes++;
        });
      });
      if(totalPreds<10)return; // minimum threshold
      var strPct=Math.round((straights/totalPreds)*100);
      var boxPct=Math.round((boxes/totalPreds)*100);
      var score=Math.round(((straights+boxes)/totalPreds)*100); // equal weight

      // Current streak — walk backwards through results checking for any hit
      var streak=0;
      for(var i=0;i<results.length;i++){
        var r=results[i];
        var anyHit=(r.preds||[]).some(function(p){return p.hit==="STRAIGHT"||p.hit==="BOX"});
        if(anyHit)streak++;
        else break;
      }

      board.push({
        key:key,st:st,gm:gm,
        totalPreds:totalPreds,straights:straights,boxes:boxes,
        strPct:strPct,boxPct:boxPct,score:score,
        streak:streak,
        drawings:drawings.length,
        lastDate:results.length>0?results[0].date:null
      });
    });
  });
  // Sort: score desc, then straights desc
  return board.sort(function(a,b){
    if(b.score!==a.score)return b.score-a.score;
    return b.straights-a.straights;
  });
}

function tierLabel(score,straights){
  if(straights>=3&&score>=30)return{icon:"🥇",label:"ELITE",color:"#f9c74f"};
  if(score>=20)return{icon:"🥈",label:"HOT",color:"#ff4e00"};
  if(score>=10)return{icon:"🥉",label:"SOLID",color:"#43aa8b"};
  return{icon:"❄️",label:"COLD",color:"#475569"};
}

// ── PDF text extraction (client-side, no library needed for text PDFs) ─────────
function readPdfAsText(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        // Try to extract readable text from PDF binary
        var raw=e.target.result;
        // PDF text is stored in stream objects between BT/ET markers
        // and also in plain text runs — extract all readable ASCII sequences
        var text="";
        // Method 1: extract text between parentheses (PDF string objects)
        var paren=raw.match(/\(([^)]{2,100})\)/g);
        if(paren&&paren.length>10){
          text=paren.map(function(s){
            return s.slice(1,-1)
              .replace(/\\n/g,"\n")
              .replace(/\\r/g,"\n")
              .replace(/\\t/g," ")
              .replace(/\\\(/g,"(")
              .replace(/\\\)/g,")")
              .replace(/\\\\/g,"\\");
          }).join(" ");
        }
        // Method 2: extract long readable ASCII runs
        if(!text||text.length<100){
          var chunks=raw.match(/[\x20-\x7E]{6,}/g)||[];
          text=chunks.join("\n");
        }
        resolve(text);
      }catch(err){reject(err)}
    };
    reader.onerror=function(){reject(new Error("Could not read file"))};
    // Read as binary string to access raw bytes
    reader.readAsBinaryString(file);
  });
}

async function onPdfUpload(input){
  var file=input.files&&input.files[0];
  if(!file)return;
  try{
    var text=await readPdfAsText(file);
    // Put extracted text into the doc paste textarea
    PT=text;
    render();
    // Scroll to textarea after render
    setTimeout(function(){
      var ta=document.getElementById("pa");
      if(ta)ta.scrollIntoView({behavior:"smooth",block:"center"});
    },100);
  }catch(e){
    alert("Could not read PDF: "+e.message+"\n\nTry copying and pasting the text manually instead.");
  }
}

function doDocPaste(){
  PT=document.getElementById("pa").value;
  const dg=DIGITS[GM];
  const sessions=["morning","midday","evening","night"];
  const drawings=[];
  const lines=PT.split("\n");

  lines.forEach(function(line){
    line=line.trim();
    if(!line)return;
    // Detect session keyword in line
    var detectedSession=PSESSION;
    var lLower=line.toLowerCase();
    if(lLower.includes("morning"))detectedSession="morning";
    else if(lLower.includes("midday")||lLower.includes("day)"))detectedSession="midday";
    else if(lLower.includes("evening"))detectedSession="evening";
    else if(lLower.includes("night"))detectedSession="night";

    // Detect date pattern like "Jan 01" or "01/15" or "Jan 01 (Thu)"
    var dateMatch=line.match(/([A-Za-z]{3}\s+\d{1,2}(?:,?\s*\d{4})?|\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)/);
    var date=dateMatch?dateMatch[1]:"";

    // Extract all digit groups of exactly dg length (word-boundary safe)
    var matches=[];
    var digitRe=dg===3?/\b\d{3}\b/g:dg===4?/\b\d{4}\b/g:/\b\d{5}\b/g;
    var m;
    while((m=digitRe.exec(line))!==null){matches.push(m[0]);}
    if(!matches.length)return;

    // If multiple matches on same line = multiple sessions (TX format)
    // Assign sessions in order: morning, midday, evening, night
    if(matches.length>1){
      matches.forEach(function(m,i){
        var sess=sessions[i]||detectedSession;
        drawings.push({numbers:m.split(""),date:date,session:sess});
      });

// Global error handler for mobile debugging
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('app');
  if(d) d.innerHTML = '<div style="padding:20px;color:#fca5a5;background:#120808;min-height:100vh;font-family:monospace;font-size:13px">'
    + '<b style="color:#ff4e00;font-size:16px">LottoIQ Error</b><br><br>'
    + '<b>Message:</b> ' + msg + '<br>'
    + '<b>Line:</b> ' + line + '<br>'
    + '<b>Source:</b> ' + (src||'').split('/').pop() + '<br><br>'
    + '<b>Fix:</b> Try clearing your browser cache, or report this error.<br><br>'
    + '<button onclick="localStorage.clear();location.reload()" style="background:#ff4e00;color:#fff;border:none;padding:12px 20px;border-radius:4px;font-size:14px;cursor:pointer">Clear Data & Reload</button>'
    + '</div>';
  return true;
};

try {
  console.log("LottoIQ: starting load...");
  loadDB();
  // Reset false MISSes: any MISS that has no dated draw data should be PENDING
  (function(){
    Object.entries(DB.dailyPreds).forEach(function(de){
      const dateKey=de[0],snap=de[1];
      Object.entries(snap).forEach(function(ge){
        const gameKey=ge[0],preds=ge[1];
        const drawings=DB.drawings[gameKey]||[];
        const datedDraws=drawings.filter(function(d){return d.date&&d.date.length>0;});
        if(!datedDraws.length){
          // No dated draws at all — reset all MISSes to PENDING
          preds.forEach(function(p){if(p.hit==="MISS")p.hit="PENDING";});
        }
      });
    });
    saveDB();
  })();
  autoCheckResults(); // WOL auto-score past predictions against draw history
  seedAllP4Combos(); // Pick 4 combo overdue data
  console.log("LottoIQ: loadDB done, seeding TX...");
  seedTXData();
  console.log("LottoIQ: TX seeded, seeding all states...");
  seedAllStates();
  console.log("LottoIQ: seed complete, rendering...");
  render();
  console.log("LottoIQ: render complete");
  if(window._SSET_ERR) console.error("Storage error during seed:", window._SSET_ERR);
} catch(e) {
  console.error('Startup error:', e);
  var d = document.getElementById('app');
  if(d) d.innerHTML = '<div style="padding:20px;color:#fca5a5;background:#120808;min-height:100vh;font-family:monospace;font-size:13px">'
    + '<b style="color:#ff4e00;font-size:16px">LottoIQ Startup Error</b><br><br>'
    + String(e) + '<br><br>'
    + '<details style="margin:10px 0"><summary style="cursor:pointer;color:#94a3b8">Stack trace</summary><pre style="font-size:10px;color:#64748b;white-space:pre-wrap">' + (e.stack||'') + '</pre></details>'
    + '<button onclick="localStorage.clear();location.reload()" style="background:#ff4e00;color:#fff;border:none;padding:12px 20px;border-radius:4px;font-size:14px;cursor:pointer;margin-right:8px">Clear Data & Reload</button>'
    + '<button onclick="seedAllStates();render()" style="background:#1e3a5f;color:#60a5fa;border:1px solid #1e4d8c;padding:12px 20px;border-radius:4px;font-size:14px;cursor:pointer">Retry Seed Only</button>'
    + '</div>';
}
